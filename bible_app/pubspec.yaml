name: bible_app
description: "Bíblia Ave Maria com busca semântica offline"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # Database
  drift: ^2.22.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.29
  path_provider: ^2.1.4

  # State management
  flutter_riverpod: ^2.6.1
  riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # ONNX Runtime for on-device query embedding
  onnxruntime: ^1.4.1

  # Utilities
  ffi: ^2.1.3
  collection: ^1.18.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.1

flutter:
  uses-material-design: true

  assets:
    - assets/data/bible.db
    - assets/embeddings/verses_embeddings.bin
    - assets/embeddings/verse_ids.bin
    - assets/models/tokenizer_vocab.txt
    - assets/models/all_minilm_l6_v2.onnx
